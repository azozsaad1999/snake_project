<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الثعبان الكلاسيكية 🐍</title>
    <style>
        /* تصميم الصفحة بالكامل */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            color: #4ecca3;
        }

        /* لوحة النتيجة */
        .score-board {
            font-size: 24px;
            margin-bottom: 15px;
            background: #162447;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* منطقة اللعب (المنصة) */
        canvas {
            background-color: #0f0f1a;
            border: 4px solid #4ecca3;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        /* رسالة الخسارة */
        .game-over-text {
            margin-top: 15px;
            font-size: 18px;
            color: #e43f5a;
            font-weight: bold;
            min-height: 25px;
        }

        /* تعليمات اللعب */
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #eeeeee;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>لعبة الثعبان 🐍</h1>
    <div class="score-board">النتيجة: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="game-over-text" id="gameOverMessage"></div>
    <div class="instructions">استخدم أسهم لوحة المفاتيح (⬆️ ⬇️ ⬅️ ➡️) للتوجيه</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const gameOverMessage = document.getElementById("gameOverMessage");

        // حجم المربع الواحد داخل الشبكة
        const gridSize = 20;
        // عدد المربعات (400 / 20 = 20 مربع طولاً وعرضاً)
        const tileCount = canvas.width / gridSize;

        // إحداثيات الثعبان (يبدأ بنقطة واحدة في المنتصف)
        let snake = [
            { x: 10, y: 10 }
        ];

        // إحداثيات الطعام الابتدائي
        let food = { x: 5, y: 5 };

        // سرعة واتجاه الحركة (يبدأ ثابتاً حتى يضغط اللاعب على زر)
        let dx = 0;
        let dy = 0;

        // النتيجة الحالية
        let score = 0;
        let gameOver = false;

        // حلقة اللعبة الرئيسية (تعمل كل 100 ميلي ثانية لتحديث الحركة ورسم العناصر)
        function mainLoop() {
            if (gameOver) return;

            updateSnakePosition();
            if (checkGameOver()) {
                gameOver = true;
                gameOverMessage.innerText = "لقد خسرت! اضغط على زر المسافة (Space) لإعادة اللعب.";
                return;
            }

            checkFoodCollision();
            clearCanvas();
            drawFood();
            drawSnake();

            // استدعاء الدالة مجدداً بعد 100ms (تتحكم في سرعة اللعبة)
            setTimeout(mainLoop, 100);
        }

        // مسح الشاشة بالكامل في كل إطار لإعادة الرسم
        function clearCanvas() {
            ctx.fillStyle = "#0f0f1a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // رسم الثعبان
        function drawSnake() {
            snake.forEach((part, index) => {
                // رأس الثعبان بلون مختلف عن الجسم
                ctx.fillStyle = index === 0 ? "#4ecca3" : "#4592af"; 
                ctx.strokeStyle = "#0f0f1a"; // حدود المربعات لتبدو منفصلة قليلاً
                
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        // رسم الطعام
        function drawFood() {
            ctx.fillStyle = "#e43f5a"; // لون الطعام أحمر
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // تحديث مكان الثعبان بناءً على الاتجاه الحالي
        function updateSnakePosition() {
            // إنشاء رأس جديد بناءً على الاتجاه الحالي dx و dy
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            // إضافة الرأس الجديد في أول مصفوفة الثعبان
            snake.unshift(head);
            // حذف الذيل للحفاظ على الطول، إلا إذا أكل الطعام (يتم التعامل معها في دالة أخرى)
            snake.pop();
        }

        // مراقبة حركة الأسهم من لوحة المفاتيح
        window.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            
            // أرقام الأزرار (KeyCodes): اليسار 37، الأعلى 38، اليمين 39، الأسفل 40
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === 37 && !goingRight) { // سهم يسار
                dx = -1; dy = 0;
            }
            if (keyPressed === 38 && !goingDown) { // سهم أعلى
                dx = 0; dy = -1;
            }
            if (keyPressed === 39 && !goingLeft) { // سهم يمين
                dx = 1; dy = 0;
            }
            if (keyPressed === 40 && !goingUp) { // سهم أسفل
                dx = 0; dy = 1;
            }

            // إعادة تشغيل اللعبة إذا ضغط على زر المسافة بعد الخسارة
            if (keyPressed === 32 && gameOver) {
                resetGame();
            }
        }

        // التحقق من اصطدام الثعبان بالطعام
        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                
                // إعادة توليد طعام في مكان عشوائي جديد
                generateRandomFood();
                
                // لكي يطول الثعبان، نعيد إضافة المربع المحذوف ببساطة عن طريق تكرار آخر قطعة
                const tail = { ...snake[snake.length - 1] };
                snake.push(tail);
            }
        }

        // توليد طعام في مكان عشوائي على الشبكة
        function generateRandomFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // التأكد من أن الطعام لم يظهر فوق جسم الثعبان بالخطأ
            snake.forEach(part => {
                const hasEaten = part.x === food.x && part.y === food.y;
                if (hasEaten) generateRandomFood();
            });
        }

        // التحقق من شروط الخسارة
        function checkGameOver() {
            // 1. الاصطدام بالجدران
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }

            // 2. الاصطدام بالجسم (تخطي الرأس [0] والتحقق من بقية الأجزاء)
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            return false;
        }

        // إعادة تصفير اللعبة للبدء من جديد
        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            generateRandomFood();
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            gameOver = false;
            gameOverMessage.innerText = "";
            mainLoop();
        }

        // تشغيل اللعبة لأول مرة عند فتح الصفحة
        mainLoop();
    </script>
</body>
</html>
